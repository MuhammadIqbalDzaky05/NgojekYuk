<ion-content [fullscreen]="true">
  <div class="auth-wrapper">
    <div class="header-section ion-text-center">
      <div class="logo-container">
        <img src="assets/icon/logo.png" alt="NgojekYuk Logo" class="app-logo">
      </div>
    </div>

    <div class="form-section ion-padding">
      <div class="login-card ion-padding">
        
        <h2 class="ion-no-margin ion-margin-bottom" style="font-weight: bold; color: #333;">Login</h2>

        <ion-item lines="none" class="input-item ion-margin-bottom">
          <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
          <ion-input [(ngModel)]="loginData.identity" placeholder="Username / Email"></ion-input>
        </ion-item>

        <ion-item lines="none" class="input-item ion-margin-bottom">
          <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
          <ion-input type="password" [(ngModel)]="loginData.password" placeholder="Password"></ion-input>
        </ion-item>

        <div class="ion-text-end ion-margin-bottom">
          <a (click)="goToForgot()" style="text-decoration: none; color: #888; font-size: 0.85rem; cursor: pointer;">
            Lupa Password?
          </a>
        </div>

        <ion-button expand="block" color="primary" class="ion-margin-top action-btn" (click)="onLogin()">
          MASUK
        </ion-button>

        <div style="text-align: center; margin: 15px 0; color: #888; font-size: 0.9rem;">atau</div>
        
        <ion-button expand="block" class="action-btn google-btn" (click)="loginWithGoogle()">
          <ion-icon slot="start" name="logo-google"></ion-icon>
          Masuk dengan Google
        </ion-button>
        
        <div class="ion-text-center ion-margin-top signup-link">
          <div style="color: #666; font-size: 0.9rem; margin-top: 15px;">
            Belum punya akun?
          </div>
          <a (click)="goToRegister()" style="cursor: pointer; color: var(--ion-color-primary); font-weight: bold; display: block; margin-top: 5px; font-size: 1rem;">
            Daftar Sekarang
          </a>
        </div>

      </div>
    </div>
  </div>
</ion-content>
